name: Verify and deploy GitHub Pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run showcase:check
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Smoke-test local Showcase startup
        env:
          SHOWCASE_NO_OPEN: "true"
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/learning-foundry-showcase.log"
          npm run showcase >"${log_file}" 2>&1 &
          showcase_pid=$!
          cleanup() {
            kill "${showcase_pid}" 2>/dev/null || true
            wait "${showcase_pid}" 2>/dev/null || true
            npm run showcase:destroy >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          ready=false
          for attempt in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:3202/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:3100/api/health >/dev/null \
              && curl --fail --silent http://127.0.0.1:3100/sign-in >/dev/null; then
              ready=true
              break
            fi
            if ! kill -0 "${showcase_pid}" 2>/dev/null; then
              echo "Showcase launcher exited before readiness"
              cat "${log_file}"
              exit 1
            fi
            sleep 2
          done

          if [[ "${ready}" != "true" ]]; then
            echo "Showcase did not become ready"
            cat "${log_file}"
            exit 1
          fi

          curl --fail --silent http://127.0.0.1:3202/health
          curl --fail --silent http://127.0.0.1:3100/api/health
          curl --fail --silent http://127.0.0.1:3100/sign-in >/dev/null
      - if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
