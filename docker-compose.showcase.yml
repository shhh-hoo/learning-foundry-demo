services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_foundry_showcase
    ports:
      - "${SHOWCASE_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learning_foundry_showcase"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - learning_foundry_showcase_postgres:/var/lib/postgresql/data

volumes:
  learning_foundry_showcase_postgres:
